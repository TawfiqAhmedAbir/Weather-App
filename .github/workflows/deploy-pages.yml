name: Deploy MyUni to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install and build
        working-directory: client
        run: |
          npm ci
          npm run build
          touch dist/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./client/dist
          publish_branch: gh-pages

      - name: Ensure GitHub Pages serves gh-pages
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const source = { branch: 'gh-pages', path: '/' };

            try {
              const { data: pages } = await github.request('GET /repos/{owner}/{repo}/pages', {
                owner,
                repo,
              });

              if (pages.source?.branch === source.branch && pages.source?.path === source.path) {
                core.info('GitHub Pages already serves gh-pages /.');
                return;
              }

              await github.request('PUT /repos/{owner}/{repo}/pages', {
                owner,
                repo,
                source,
              });
              core.info('Updated GitHub Pages source to gh-pages /.');
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              await github.request('POST /repos/{owner}/{repo}/pages', {
                owner,
                repo,
                source,
              });
              core.info('Created GitHub Pages site from gh-pages /.');
            }
